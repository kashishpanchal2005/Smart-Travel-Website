<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Travel Website - Team Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { 
            background-color: #4f46e5; 
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2); 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20 md:pb-0 md:pl-64">

    <!-- Sidebar - Desktop -->
    <aside class="fixed left-0 top-0 hidden h-full w-64 flex-col border-r bg-white p-6 md:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-indigo-900">ExploreTeam</h1>
        </div>

        <nav class="flex-1 space-y-2" id="desktop-nav">
            <button onclick="switchTab('explore')" class="nav-item active flex w-full items-center gap-4 rounded-2xl px-5 py-4 text-sm font-bold transition-all text-slate-400 hover:bg-slate-50 hover:text-slate-900" data-tab="explore">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-2 5.6-5.6 2 2-5.6 5.6-2z"/></svg>
                Explore
            </button>
            <button onclick="switchTab('itinerary')" class="nav-item flex w-full items-center gap-4 rounded-2xl px-5 py-4 text-sm font-bold transition-all text-slate-400 hover:bg-slate-50 hover:text-slate-900" data-tab="itinerary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                My Itinerary
            </button>
            <button onclick="switchTab('budget')" class="nav-item flex w-full items-center gap-4 rounded-2xl px-5 py-4 text-sm font-bold transition-all text-slate-400 hover:bg-slate-50 hover:text-slate-900" data-tab="budget">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                Budget Plan
            </button>
            <button onclick="switchTab('wishlist')" class="nav-item flex w-full items-center gap-4 rounded-2xl px-5 py-4 text-sm font-bold transition-all text-slate-400 hover:bg-slate-50 hover:text-slate-900" data-tab="wishlist">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                Wishlist
            </button>
        </nav>

        <div class="border-t pt-6">
            <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-2xl">
                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold">JD</div>
                <div class="overflow-hidden">
                    <p class="text-sm font-bold truncate">John Doe</p>
                    <p class="text-xs text-slate-500 truncate">Premium Member</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="p-4 md:p-8 max-w-6xl mx-auto">
        <header class="mb-8">
            <h2 id="current-tab-title" class="text-3xl font-black text-slate-800 capitalize tracking-tight">Explore</h2>
            <p class="text-slate-500">Plan your journey with ease.</p>
        </header>

        <!-- Explore View -->
        <section id="explore" class="tab-content active space-y-6">
            <div class="relative">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <input type="text" id="dest-search" placeholder="Where to next?" class="w-full rounded-2xl border-none bg-white p-4 pl-12 shadow-sm focus:ring-2 focus:ring-indigo-500 transition-shadow">
            </div>
            <div id="destinations-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Destinations rendered by JS -->
            </div>
        </section>

        <!-- Itinerary View -->
        <section id="itinerary" class="tab-content space-y-8">
            <div class="rounded-[2.5rem] bg-indigo-600 p-10 text-white shadow-xl flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="text-3xl font-black mb-2">My Trips</h3>
                    <p class="text-indigo-100 opacity-90">Organize your schedules and routes.</p>
                </div>
                <button onclick="addItinerary()" class="relative z-10 flex items-center gap-2 rounded-2xl bg-white px-8 py-4 text-indigo-600 font-bold hover:bg-indigo-50 transition-colors shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    Create New Trip
                </button>
            </div>
            <div id="itinerary-list" class="grid gap-4">
                <!-- Itineraries rendered by JS -->
            </div>
        </section>

        <!-- Budget View -->
        <section id="budget" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-6">
                    <div class="rounded-[2rem] bg-white p-8 shadow-sm border border-slate-100">
                        <h3 class="text-lg font-bold text-slate-500 mb-6 uppercase tracking-widest">Spent So Far</h3>
                        <div id="total-spent" class="text-5xl font-black text-slate-900 mb-6 tracking-tight">$0.00</div>
                        <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden mb-4">
                            <div id="budget-progress" class="h-full bg-indigo-500 rounded-full" style="width: 0%"></div>
                        </div>
                        <p class="text-sm font-bold text-indigo-600">Spent of your $5,000 budget</p>
                    </div>
                    <div class="rounded-[2rem] bg-white p-8 shadow-sm border border-slate-100">
                        <h3 class="text-lg font-bold mb-6">New Expense</h3>
                        <form id="expense-form" class="space-y-5">
                            <div class="space-y-1.5">
                                <label class="text-xs font-black text-slate-400 uppercase tracking-tighter">Description</label>
                                <input name="title" required type="text" class="w-full rounded-xl border-none bg-slate-50 p-3.5 focus:ring-2 focus:ring-indigo-500" placeholder="e.g. Flight Tickets">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-xs font-black text-slate-400 uppercase tracking-tighter">Amount ($)</label>
                                <input name="amount" required type="number" step="0.01" class="w-full rounded-xl border-none bg-slate-50 p-3.5 focus:ring-2 focus:ring-indigo-500" placeholder="0.00">
                            </div>
                            <button type="submit" class="w-full rounded-2xl bg-indigo-600 py-4 font-black text-white transition hover:bg-indigo-700 shadow-lg shadow-indigo-100">Add Transaction</button>
                        </form>
                    </div>
                </div>
                <div class="lg:col-span-2">
                    <div class="rounded-[2rem] bg-white p-8 shadow-sm border border-slate-100 min-h-[400px]">
                        <h3 class="text-xl font-bold mb-8 text-slate-800">History</h3>
                        <div id="expense-history" class="space-y-4">
                            <!-- Expenses rendered by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Wishlist View -->
        <section id="wishlist" class="tab-content">
            <div id="wishlist-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Wishlist items rendered by JS -->
            </div>
        </section>
    </main>

    <!-- Mobile Navigation -->
    <nav class="fixed bottom-0 left-0 flex w-full justify-around border-t bg-white/80 backdrop-blur-xl p-4 md:hidden z-50">
        <button onclick="switchTab('explore')" class="mobile-nav-item p-3 rounded-2xl text-indigo-600 bg-indigo-50" data-tab="explore">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-2 5.6-5.6 2 2-5.6 5.6-2z"/></svg>
        </button>
        <button onclick="switchTab('itinerary')" class="mobile-nav-item p-3 rounded-2xl text-slate-400" data-tab="itinerary">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        </button>
        <button onclick="switchTab('budget')" class="mobile-nav-item p-3 rounded-2xl text-slate-400" data-tab="budget">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
        </button>
        <button onclick="switchTab('wishlist')" class="mobile-nav-item p-3 rounded-2xl text-slate-400" data-tab="wishlist">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </button>
    </nav>

    <script>
        // --- DATA ---
        const DESTINATIONS = [
            { id: 1, name: "Tokyo, Japan", category: "Culture", priceLevel: "$$$", image: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&q=80&w=800", description: "Experience the perfect blend of ancient temples and modern culture." },
            { id: 2, name: "Santorini, Greece", category: "Relaxation", priceLevel: "$$$$", image: "https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?auto=format&fit=crop&q=80&w=800", description: "Stunning sunsets, white-washed buildings, and the crystal blue Aegean sea." },
            { id: 3, name: "Banff, Canada", category: "Adventure", priceLevel: "$$", image: "https://images.unsplash.com/photo-1517411032315-54ef2cb783bb?auto=format&fit=crop&q=80&w=800", description: "Turquoise glacial lakes and majestic mountain peaks for outdoor lovers." },
            { id: 4, name: "Marrakech, Morocco", category: "History", priceLevel: "$", image: "https://images.unsplash.com/photo-1539020140153-e479b8c22e70?auto=format&fit=crop&q=80&w=800", description: "Vibrant souks, beautiful riads, and rich architectural history." }
        ];

        let state = {
            activeTab: 'explore',
            itineraries: [{ id: 1, name: 'Summer in Japan', date: new Date().toLocaleDateString() }],
            wishlist: [],
            expenses: [{ id: 1, title: 'Hotel Booking', amount: 450.00, date: new Date().toLocaleDateString() }],
            budget: 5000
        };

        // --- NAVIGATION ---
        function switchTab(tabId) {
            state.activeTab = tabId;
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('current-tab-title').innerText = tabId;

            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(btn => {
                if (btn.dataset.tab === tabId) {
                    btn.classList.add('active', 'bg-indigo-600', 'text-white');
                    if(btn.classList.contains('mobile-nav-item')) btn.classList.add('bg-indigo-50', 'text-indigo-600');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('active', 'bg-indigo-600', 'text-white', 'bg-indigo-50', 'text-indigo-600');
                    btn.classList.add('text-slate-400');
                }
            });
            render();
        }

        // --- RENDER FUNCTIONS ---
        function render() {
            renderExplore();
            renderItineraries();
            renderBudget();
            renderWishlist();
        }

        function renderExplore(filter = '') {
            const grid = document.getElementById('destinations-grid');
            const filtered = DESTINATIONS.filter(d => d.name.toLowerCase().includes(filter.toLowerCase()));
            grid.innerHTML = filtered.map(dest => `
                <div class="group overflow-hidden rounded-[2rem] bg-white shadow-sm border border-slate-100">
                    <div class="relative h-56">
                        <img src="${dest.image}" class="h-full w-full object-cover transition-transform group-hover:scale-110" />
                        <button onclick="toggleWishlist(${dest.id})" class="absolute right-4 top-4 rounded-full bg-white/90 p-2.5 text-slate-900 backdrop-blur-md hover:text-rose-500 shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="${state.wishlist.find(w => w.id === dest.id) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                        </button>
                        <div class="absolute left-4 bottom-4 rounded-full bg-indigo-600 px-4 py-1.5 text-xs font-bold text-white">${dest.category}</div>
                    </div>
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-xl font-bold">${dest.name}</h3>
                            <span class="text-emerald-600 font-bold bg-emerald-50 px-2 py-1 rounded-lg text-xs">${dest.priceLevel}</span>
                        </div>
                        <p class="text-sm text-slate-500 mb-6 leading-relaxed">${dest.description}</p>
                        <button class="w-full rounded-xl bg-slate-900 py-3.5 text-sm font-bold text-white hover:bg-indigo-600 transition-colors">View Destination</button>
                    </div>
                </div>
            `).join('');
        }

        function renderItineraries() {
            const list = document.getElementById('itinerary-list');
            if (state.itineraries.length === 0) {
                list.innerHTML = `<div class="text-center py-24 border-4 border-dashed rounded-[3rem] text-slate-300">No trips planned.</div>`;
                return;
            }
            list.innerHTML = state.itineraries.map(trip => `
                <div class="flex items-center justify-between rounded-[2rem] bg-white p-6 shadow-sm border border-slate-50">
                    <div class="flex items-center gap-5">
                        <div class="bg-indigo-50 p-4 rounded-2xl text-indigo-600"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div>
                        <div>
                            <h4 class="font-bold text-xl">${trip.name}</h4>
                            <p class="text-sm text-slate-400">Created: ${trip.date}</p>
                        </div>
                    </div>
                    <button onclick="deleteItinerary(${trip.id})" class="p-3 bg-slate-50 text-rose-400 rounded-xl hover:bg-rose-50"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                </div>
            `).join('');
        }

        function renderBudget() {
            const total = state.expenses.reduce((acc, curr) => acc + curr.amount, 0);
            document.getElementById('total-spent').innerText = `$${total.toFixed(2)}`;
            const progress = (total / state.budget) * 100;
            document.getElementById('budget-progress').style.width = `${Math.min(progress, 100)}%`;

            const history = document.getElementById('expense-history');
            history.innerHTML = state.expenses.map(exp => `
                <div class="flex items-center justify-between p-5 rounded-2xl border border-transparent hover:border-slate-100 hover:bg-slate-50 transition-colors">
                    <div class="flex items-center gap-5">
                        <div class="bg-emerald-50 p-3 rounded-2xl text-emerald-600"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                        <div><p class="font-bold text-slate-800">${exp.title}</p><p class="text-xs text-slate-400">${exp.date}</p></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="font-black text-xl text-slate-900">$${exp.amount.toFixed(2)}</span>
                        <button onclick="deleteExpense(${exp.id})" class="text-rose-400"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                    </div>
                </div>
            `).join('');
        }

        function renderWishlist() {
            const container = document.getElementById('wishlist-container');
            if (state.wishlist.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-40 bg-white rounded-[3rem] border-2 border-dashed border-slate-100 text-slate-400">Your wishlist is empty.</div>`;
                return;
            }
            container.innerHTML = state.wishlist.map(item => `
                <div class="overflow-hidden rounded-[2rem] bg-white shadow-sm border border-slate-50">
                    <img src="${item.image}" class="h-56 w-full object-cover" />
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-1">${item.name}</h3>
                        <p class="text-sm text-slate-400 mb-6">${item.category}</p>
                        <div class="flex gap-2">
                             <button onclick="toggleWishlist(${item.id})" class="px-4 py-3 bg-rose-50 text-rose-500 rounded-xl font-bold">Remove</button>
                             <button class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Plan Trip</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- ACTIONS ---
        function toggleWishlist(id) {
            const index = state.wishlist.findIndex(w => w.id === id);
            if (index > -1) state.wishlist.splice(index, 1);
            else state.wishlist.push(DESTINATIONS.find(d => d.id === id));
            render();
        }

        function addItinerary() {
            const name = prompt("Enter Trip Name:");
            if (name) {
                state.itineraries.push({ id: Date.now(), name, date: new Date().toLocaleDateString() });
                render();
            }
        }

        function deleteItinerary(id) {
            state.itineraries = state.itineraries.filter(t => t.id !== id);
            render();
        }

        function deleteExpense(id) {
            state.expenses = state.expenses.filter(e => e.id !== id);
            render();
        }

        // --- INITIALIZATION ---
        document.getElementById('dest-search').addEventListener('input', (e) => renderExplore(e.target.value));

        document.getElementById('expense-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            state.expenses.push({
                id: Date.now(),
                title: formData.get('title'),
                amount: parseFloat(formData.get('amount')),
                date: new Date().toLocaleDateString()
            });
            e.target.reset();
            render();
        });

        // Start app
        render();
    </script>
</body>
</html>
